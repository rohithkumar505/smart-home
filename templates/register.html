{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5 magic-reveal" style="--magic-delay:0.04s">
    <div class="col-md-5">
        <div class="card custom-card">
            <div class="card-header text-center">
                <h3 class="mb-0">Create Account</h3>
                <p class="text-muted small mb-0">Join your Smart Home</p>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="{{ url_for('register') }}">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Register</button>
                </form>
                <div class="mt-4 text-center">
                    <p class="mb-0">Already have an account? <a href="{{ url_for('login') }}" class="text-primary text-decoration-none fw-bold">Login</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
