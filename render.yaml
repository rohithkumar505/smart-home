# Blueprint for https://render.com — connect this repo, then "New" -> "Blueprint"
# Or create a Web Service manually: build `pip install -r requirements.txt`, start `gunicorn wsgi:app --bind 0.0.0.0:$PORT`
services:
  - type: web
    name: smart-home
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
