# Render Blueprint — https://render.com
# Connect repo → New → Blueprint, OR create Web Service manually with same settings.
services:
  - type: web
    name: smart-home
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: MONGODB_URI
        sync: false
    healthCheckPath: /login
